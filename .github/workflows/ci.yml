name: CI

on:
  push:
    branches: ["main", "claude/**", "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: >
          python -m pytest -m unit -q --tb=short
          --ignore=tests/sensing
          --deselect=tests/test_eastmoney_news.py::TestRouting::test_ashare_routes_to_eastmoney
          --deselect=tests/test_searxng.py::test_router_falls_back_when_searxng_unavailable
          --deselect=tests/test_trace_callback.py::TestTradingAgentsGraphWiring::test_default_config_registers_trace_callback
          --deselect=tests/test_trace_callback.py::TestTradingAgentsGraphWiring::test_disabled_flag_skips_trace_callback
          --deselect=tests/test_trace_callback.py::TestTradingAgentsGraphWiring::test_user_callbacks_appended_after_trace
          --deselect=tests/test_determinism.py::TestTradingGraphForwardsDeterminismKwargs::test_provider_kwargs_include_determinism
          --deselect=tests/test_risk_constraints.py::test_portfolio_manager_prompt_starts_with_constraints
