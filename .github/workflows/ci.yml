name: CI

on:
  push:
    branches: ["main", "claude/**", "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run unit tests
        run: >
          python -m pytest -m unit -q --tb=short
          --ignore=tests/sensing
          --deselect=tests/test_eastmoney_news.py::TestRouting::test_ashare_routes_to_eastmoney
          --deselect=tests/test_searxng.py::test_router_falls_back_when_searxng_unavailable
          --deselect=tests/test_trace_callback.py::TestTradingAgentsGraphWiring::test_default_config_registers_trace_callback
          --deselect=tests/test_trace_callback.py::TestTradingAgentsGraphWiring::test_disabled_flag_skips_trace_callback
          --deselect=tests/test_trace_callback.py::TestTradingAgentsGraphWiring::test_user_callbacks_appended_after_trace
          --deselect=tests/test_determinism.py::TestTradingGraphForwardsDeterminismKwargs::test_provider_kwargs_include_determinism
          --deselect=tests/test_risk_constraints.py::test_portfolio_manager_prompt_starts_with_constraints

  smoke-install:
    name: clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fresh install (no dev extras) and import
        run: |
          python -m pip install --upgrade pip
          pip install .
          # Catches undeclared runtime deps (e.g. #994 python-dotenv): a bare
          # install must import the package and the CLI module.
          python -c "import tradingagents, cli.main; print('clean-install import OK')"

  lint:
    name: ruff (strict, full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.15"
      - name: Lint the repository
        # The repo is fully clean under the strict select, so we lint everything
        # (results/ and worklog/ are excluded via pyproject extend-exclude).
        run: ruff check .
