services:
  # Web UI service (main)
  web:
    build: .
    command: python -m web.app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    # Restart policy for Railway.com
    restart: unless-stopped

  # CLI service (for development)
  tradingagents:
    build: .
    entrypoint: tradingagents
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./reports:/home/appuser/app/reports
    tty: true
    stdin_open: true
    profiles:
      - cli

  # ── TradingAgents REST API ────────────────────────────────────────────────
  tradingagents-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: vkdocker/tradingagents-api:latest
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - LLM_PROVIDER=ollama
      - DEEP_THINK_MODEL=qwen3.5:4b
      - QUICK_THINK_MODEL=qwen3.5:4b
      - TRADINGAGENTS_API_DB_PATH=/data/db/tradingagents_api.db
      - API_DEBUG_MODE=true
      - MAX_WORKERS=1
    ports:
      - "9000:9000"
    volumes:
      - tradingagents_api_data:/data
      - tradingagents_api_db:/data/db
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./reports:/home/appuser/app/reports
    depends_on:
      ollama:
        condition: service_healthy
    tty: true
    stdin_open: true
    profiles:
      - ollama

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradingagents
      POSTGRES_USER: tradingagents
      POSTGRES_PASSWORD: tradingagents
    ports:
      - "5432:5432"
    volumes:
      - tradingagents_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingagents -d tradingagents"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://tradingagents:tradingagents@postgres:5432/tradingagents
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
    entrypoint: ["tradingagents-api"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./output:/home/appuser/app/output
    ports:
      - "8000:8000"
    profiles:
      - service

  worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://tradingagents:tradingagents@postgres:5432/tradingagents
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      WORKER_STALE_RUNNING_SECONDS: "300"
    entrypoint: ["tradingagents-worker"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./output:/home/appuser/app/output
    profiles:
      - service

volumes:
  tradingagents_data:
  tradingagents_api_data:
  tradingagents_api_db:
  ollama_data:
  tradingagents_postgres_data:
